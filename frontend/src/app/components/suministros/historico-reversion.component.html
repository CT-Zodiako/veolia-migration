<p-card header="Histórico de Reversiones">
  <p-table
    [value]="filteredRows"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [tableStyle]="{ 'min-width': '100%' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>APS ID</th>
        <th>APS Nombre</th>
        <th>Año</th>
        <th>Mes</th>
        <th>Motivo</th>
        <th>Fecha</th>
        <th>Usuario</th>
      </tr>
      <tr class="filter-row">
        <th></th>
        <th></th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="apsFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="annoFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="mesFilter = $any($event.target).value" />
        </th>
        <th></th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="fechaFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="usuarioFilter = $any($event.target).value" />
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.id }}</td>
        <td>{{ row.aps }}</td>
        <td>{{ row.nombreAps }}</td>
        <td>{{ row.anno }}</td>
        <td>{{ row.mes }}</td>
        <td>{{ row.motivo }}</td>
        <td>{{ row.fecha | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ row.usuario }}</td>
      </tr>
    </ng-template>
  </p-table>

  <p *ngIf="error" style="color: var(--color-brand-accent); margin-top: 12px;">{{ error }}</p>
</p-card>

<section>
  <div class="card-section">
    <app-parametros-consulta
      [wrapInCard]="false"
      [mostrarAps]="true"
      [mostrarBoton]="false"
      [autoConsultar]="true"
      [aps]="aps()"
      (apsChange)="aps.set($event)"
      [anno]="anno()"
      (annoChange)="anno.set($event)"
      [mes]="mes()"
      (mesChange)="mes.set($event)"
      (consultar)="consultar()"
      (parametrosIncompletos)="limpiar()">
    </app-parametros-consulta>
  </div>

  <p-message *ngIf="estado()" severity="info" [text]="estado()" styleClass="w-full mb-3"></p-message>

  <div class="card-section" *ngIf="verificando()">
    <p class="loading-text">Verificando información existente...</p>
  </div>

  <div class="card-section" *ngIf="filtrosValidos() && archivosExistentes() === true">
    <p-message severity="warn" [text]="'Ya existen archivos generados para el SUI correspondientes al APS y período seleccionados (' + cantidadArchivos() + ' registro(s) en F24).'"></p-message>
  </div>

  <div class="card-section" *ngIf="mostrarFormulario()">
    <div class="cargue-header">
      <h3>Cargue de Información Complementaria</h3>
      <a class="descarga-plano" (click)="descargarPlano()">⚡ Descargar Plano Guía</a>
    </div>

    <div class="file-row">
      <input type="file" accept=".csv" (change)="onArchivoSeleccionado($event)" #fileInput />
      <span class="file-name" *ngIf="nombreArchivo()">{{ nombreArchivo() }}</span>
      <button pButton label="Cancelar" severity="danger" [outlined]="true" [disabled]="!nombreArchivo()" (click)="cancelarCargue(); fileInput.value = ''"></button>
    </div>

    <div *ngIf="errores().length" class="errores-box">
      <p-message *ngFor="let err of errores()" severity="error" [text]="err" styleClass="w-full mb-2"></p-message>
    </div>

    <div *ngIf="hayPreview()">
      <h4>Vista Previa</h4>
      <app-tabla-avanzada
        [columnas]="columnasPreview"
        [rows]="filas()"
        [autoWidth]="true"
        storageKey="sui-cargue-complementario"
        nombreExportar="Cargue_Complementario">
      </app-tabla-avanzada>

      <div class="guardar-row">
        <button pButton label="Guardar Información" icon="pi pi-save" [loading]="guardando()" (click)="guardar()"></button>
      </div>
    </div>
  </div>
</section>

<p-toast></p-toast>

<p-card header="Dashboard Gerencial">
  <div class="grid mb-3">
    <div class="col-12 md:col-3">
      <app-anno-selector [selectedAnno]="anno()" (selectedAnnoChange)="anno.set($event)" label="Año"></app-anno-selector>
    </div>
    <div class="col-12 md:col-3">
      <app-mes-selector [selectedMes]="mes()" (selectedMesChange)="mes.set($event)" label="Mes"></app-mes-selector>
    </div>
    <div class="col-12 md:col-3 flex align-items-end">
      <button pButton type="button" label="Consultar" icon="pi pi-search" (click)="consultar()"></button>
    </div>
  </div>

  <div *ngIf="loading()" class="text-center py-4"><i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i><p>Cargando...</p></div>
  <div *ngIf="error()" class="p-error p-3"><i class="pi pi-exclamation-circle"></i> {{ error() }}</div>
  <div *ngIf="!loading() && !error() && data().length === 0" class="text-center py-4 text-secondary"><i class="pi pi-inbox" style="font-size: 2rem"></i><p>Sin datos para mostrar</p></div>

  <p-table *ngIf="data().length > 0" [value]="data()" [scrollable]="true" scrollHeight="430px" [tableStyle]="{ 'min-width': '60rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>APS ID</th>
        <th>APS</th>
        <th>Fecha Tarifa</th>
        <th>Correo Usuario</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.APSA_ID || row.apsa_id }}</td>
        <td>{{ row.APSA_NOMAPS || row.apsa_nomaps }}</td>
        <td>{{ row.TARI_FECHACREACION || row.tari_fechacreacion }}</td>
        <td>{{ row.SISU_CORREO || row.sisu_correo }}</td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

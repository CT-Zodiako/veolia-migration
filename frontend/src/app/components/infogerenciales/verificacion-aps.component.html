<p-toast></p-toast>

<div class="card-section">
  <div class="parametros-row">
    <app-aps-selector [selectedAps]="aps()" (selectedApsChange)="onApsChange($event)" label="APS"></app-aps-selector>
    <app-anno-selector [selectedAnno]="anno()" (selectedAnnoChange)="onAnnoChange($event)" label="Año"></app-anno-selector>
    <app-mes-selector [selectedMes]="mes()" (selectedMesChange)="onMesChange($event)" label="Mes"></app-mes-selector>
  </div>
</div>

<!-- Resumen Empresa -->
<div class="card-section">
  <h3 class="table-title">Resumen Empresa</h3>
  <div class="table-wrapper table-scroll">
    <app-tabla-avanzada
      [columnas]="columnasEmpresa"
      [rows]="emprData()"
      storageKey="verificacion-empresa"
      nombreExportar="ResumenEmpresa"
    ></app-tabla-avanzada>
  </div>
</div>

<!-- Resumen APS -->
<div class="card-section">
  <h3 class="table-title">Resumen APS</h3>
  <div class="table-wrapper table-scroll">
    <app-tabla-avanzada
      [columnas]="columnasAps"
      [rows]="apsEmprData()"
      storageKey="verificacion-aps"
      nombreExportar="ResumenAPS"
    ></app-tabla-avanzada>
  </div>
</div>

<!-- Resumen Relleno -->
<div class="card-section">
  <h3 class="table-title">Resumen Relleno</h3>
  <div class="table-wrapper table-scroll">
    <app-tabla-avanzada
      [columnas]="columnasRelleno"
      [rows]="rellenoData()"
      storageKey="verificacion-relleno"
      nombreExportar="ResumenRelleno"
    ></app-tabla-avanzada>
  </div>
</div>

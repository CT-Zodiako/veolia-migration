<div class="page-wrap">
  <p-card>
    <div class="toolbar">
      <p-select [options]="reliquidaciones()" optionLabel="relqNombre" optionValue="relqId" [(ngModel)]="selectedReliq" placeholder="Seleccione reliquidación" />
      <p-button label="Consultar" icon="pi pi-search" [loading]="loading()" (onClick)="consultar()" />
    </div>
  </p-card>

  <p-card styleClass="mt-3">
    <p-tabs [value]="currentTab()" (valueChange)="onTabChange($event)">
      <p-tablist>
        <p-tab value="usuarios">Usuarios</p-tab>
        <p-tab value="empresa">Empresa</p-tab>
        <p-tab value="aps">APS</p-tab>
        <p-tab value="relleno">Relleno</p-tab>
        <p-tab value="adicional">Adicional</p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel value="usuarios">
          <p-table [value]="usuarios()" styleClass="p-datatable-sm"></p-table>
          <p-button label="Guardar Usuarios" class="mt-2" (onClick)="guardar('usuarios')" />
        </p-tabpanel>
        <p-tabpanel value="empresa">
          <p-table [value]="empresa()" styleClass="p-datatable-sm"></p-table>
          <p-button label="Guardar Empresa" class="mt-2" (onClick)="guardar('empresa')" />
        </p-tabpanel>
        <p-tabpanel value="aps">
          <p-table [value]="aps()" styleClass="p-datatable-sm"></p-table>
          <p-button label="Guardar APS" class="mt-2" (onClick)="guardar('aps')" />
        </p-tabpanel>
        <p-tabpanel value="relleno">
          <p-table [value]="relleno()" styleClass="p-datatable-sm"></p-table>
          <p-button label="Guardar Relleno" class="mt-2" (onClick)="guardar('relleno')" />
        </p-tabpanel>
        <p-tabpanel value="adicional">
          <p-table [value]="adicional()" styleClass="p-datatable-sm"></p-table>
          <p-button label="Guardar Adicional" class="mt-2" (onClick)="guardar('adicional')" />
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </p-card>
</div>

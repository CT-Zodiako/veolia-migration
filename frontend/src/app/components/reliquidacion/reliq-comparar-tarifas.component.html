<div class="page-wrap">
  <p-card>
    <div class="toolbar">
      <p-select [options]="reliquidaciones()" optionLabel="relqNombre" optionValue="relqId" [(ngModel)]="selectedReliq" placeholder="Seleccione reliquidación" />
      <p-inputNumber [(ngModel)]="selectedAnno" [min]="2000" [max]="2100"></p-inputNumber>
      <p-button label="Comparar tarifas" icon="pi pi-search" [loading]="loading()" (onClick)="consultar()" />
    </div>
  </p-card>

  <p-card styleClass="mt-3">
    <p-table [value]="rows()" [loading]="loading()" styleClass="p-datatable-sm">
      <ng-template pTemplate="header"><tr><th>Reli</th><th>Componente</th><th>Tarifa</th></tr></ng-template>
      <ng-template pTemplate="body" let-row><tr><td>{{ row.reli }}</td><td>{{ row.componente }}</td><td>{{ row.tarifa }}</td></tr></ng-template>
    </p-table>
  </p-card>

  <p-card styleClass="mt-3">
    <h4>Resumen JSON</h4>
    <pre>{{ resumenJson() | json }}</pre>
  </p-card>
</div>

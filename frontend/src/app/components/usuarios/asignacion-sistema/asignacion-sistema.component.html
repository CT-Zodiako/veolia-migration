<div class="sistema-container">
  <div class="sistema-header">
    <h2>Asignación de Sistemas por Usuario</h2>
    <p class="sistema-subtitle">Elegí un usuario y arrastrá los sistemas entre columnas para asignarlos o quitarlos.</p>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="success" class="success-message">{{ success }}</div>

  <div class="filters">
    <div class="form-group">
      <label>Usuario</label>
      <p-select
        [options]="usuarioOptions"
        [(ngModel)]="correo"
        optionLabel="label"
        optionValue="value"
        placeholder="Seleccione un usuario"
        [style]="{width: '100%'}"
        [filter]="true"
        filterBy="label"
        filterPlaceholder="Buscar usuario..."
        (onChange)="buscarSistemas()"
      ></p-select>
    </div>
  </div>

  <div *ngIf="sisuId" class="picklist-card">
    <p-pickList
      [source]="listaSistema[0]"
      [target]="listaSistema[1]"
      sourceHeader="Sin asignar"
      targetHeader="Asignados"
      [dragdrop]="true"
      [responsive]="true"
      [sourceStyle]="{height: '360px'}"
      [targetStyle]="{height: '360px'}"
      [showSourceControls]="false"
      [showTargetControls]="false"
      breakpoint="1400px"
    >
      <ng-template let-sistema pTemplate="item">
        <div class="sistema-chip">
          <i class="pi pi-desktop"></i>
          <span>{{ sistema.SIST_NOMBRE }}</span>
        </div>
      </ng-template>
      <ng-template pTemplate="emptymessagesource">
        <div class="empty-list-message">Todos los sistemas están asignados</div>
      </ng-template>
      <ng-template pTemplate="emptymessagetarget">
        <div class="empty-list-message">Sin sistemas asignados todavía</div>
      </ng-template>
    </p-pickList>
  </div>

  <p-button
    *ngIf="sisuId"
    icon="pi pi-save"
    label="{{ loading ? 'Guardando...' : 'Actualizar Asignación de Sistema' }}"
    [loading]="loading"
    (click)="guardar()"
    styleClass="w-full"
  ></p-button>
</div>

<div class="aps-container">
  <div class="aps-header">
    <h2>Asignación de APS por Usuario</h2>
    <p class="aps-subtitle">Elegí un usuario y arrastrá los APS entre columnas para asignarlos o quitarlos.</p>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="success" class="success-message">{{ success }}</div>

  <div class="filters">
    <div class="form-group">
      <label>Usuario</label>
      <p-select
        [options]="usuarioOptions"
        [(ngModel)]="selectedUsuarioId"
        optionLabel="label"
        optionValue="value"
        placeholder="Seleccione un usuario"
        [style]="{width: '100%'}"
        [filter]="true"
        filterBy="label"
        filterPlaceholder="Buscar usuario..."
        (onChange)="onUsuarioChange()"
      ></p-select>
    </div>
  </div>

  <div *ngIf="selectedUsuarioId" class="picklist-card">
    <p-pickList
      [source]="listaAps[0]"
      [target]="listaAps[1]"
      sourceHeader="Sin asignar"
      targetHeader="Asignadas"
      [dragdrop]="true"
      [responsive]="true"
      [sourceStyle]="{height: '360px'}"
      [targetStyle]="{height: '360px'}"
      [showSourceControls]="false"
      [showTargetControls]="false"
      [filterBy]="'APSA_NOMAPS'"
      [showSourceFilter]="true"
      [showTargetFilter]="true"
      sourceFilterPlaceholder="Buscar APS..."
      targetFilterPlaceholder="Buscar APS..."
      breakpoint="1400px"
    >
      <ng-template let-aps pTemplate="item">
        <div class="aps-chip">
          <i class="pi pi-map-marker"></i>
          <span>{{ aps.APSA_NOMAPS }}</span>
        </div>
      </ng-template>
      <ng-template pTemplate="emptymessagesource">
        <div class="empty-list-message">Todos los APS están asignados</div>
      </ng-template>
      <ng-template pTemplate="emptymessagetarget">
        <div class="empty-list-message">Sin APS asignados todavía</div>
      </ng-template>
    </p-pickList>
  </div>

  <p-button
    *ngIf="selectedUsuarioId"
    icon="pi pi-save"
    label="{{ loading ? 'Guardando...' : 'Actualizar Asignación de APS' }}"
    [loading]="loading"
    (click)="guardar()"
    styleClass="w-full"
  ></p-button>
</div>

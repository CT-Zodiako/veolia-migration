<p-toast></p-toast>

<div class="card-section">
  <div class="filters">
    <app-anno-selector [selectedAnno]="anno()" (selectedAnnoChange)="onAnnoChange($event)" label="Año"></app-anno-selector>
    <app-mes-selector [selectedMes]="mes()" (selectedMesChange)="onMesChange($event)" label="Mes"></app-mes-selector>
  </div>
</div>

<div class="card-section">
  <p-table [value]="rows()" [loading]="loading()" [tableStyle]="{ 'min-width': '30rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>Tipo Índice</th>
        <th class="text-right">Valor</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ nombreIndice(row.paraIndice20011) }}</td>
        <td class="text-right">
          <p-inputnumber
            *ngIf="editingParaId() === row.paraIndice20011; else valorReadonly"
            [ngModel]="editingValor()"
            (ngModelChange)="editingValor.set($event)"
            mode="decimal"
            [minFractionDigits]="0"
            [maxFractionDigits]="4"
          ></p-inputnumber>
          <ng-template #valorReadonly>{{ row.indiValor }}</ng-template>
        </td>
        <td class="actions">
          <ng-container *ngIf="editingParaId() === row.paraIndice20011; else accionEditar">
            <p-button icon="pi pi-check" severity="success" size="small" (click)="confirmarGuardar(row)"></p-button>
            <p-button icon="pi pi-times" severity="secondary" size="small" (click)="cancelarEdicion()"></p-button>
          </ng-container>
          <ng-template #accionEditar>
            <p-button icon="pi pi-pencil" severity="info" size="small" (click)="iniciarEdicion(row)"></p-button>
          </ng-template>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

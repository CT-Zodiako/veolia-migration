<p-toast></p-toast>

<div class="card-section">
  <div class="grid">
    <div class="col-12 md:col-3">
      <app-aps-selector
        [selectedAps]="aps()"
        (selectedApsChange)="onApsChange($event)"
        label="APS"
      ></app-aps-selector>
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Proyección</label>
      <p-select
        [options]="proyecciones()"
        optionLabel="proyNombre"
        optionValue="proyId"
        placeholder="Seleccione proyección"
        [ngModel]="proyId()"
        (ngModelChange)="onProyChange($event)"
        [disabled]="proyecciones().length === 0"
        styleClass="w-full"
      ></p-select>
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Horizonte Desde</label>
      <input pInputText class="w-full" [ngModel]="horizonteDesde()" disabled />
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Horizonte Hasta</label>
      <input pInputText class="w-full" [ngModel]="horizonteHasta()" disabled />
    </div>
    <div class="col-12">
      <label class="block mb-1">Descripción</label>
      <textarea
        pTextarea
        class="w-full"
        rows="3"
        [ngModel]="proyeccionSeleccionada()?.proyDescripcion || ''"
        disabled
      ></textarea>
    </div>
  </div>
</div>

<div class="card-section">
  <p-tabs [(value)]="activeTab" (valueChange)="onTabChange($event)">
    <p-tablist>
      <p-tab [value]="0">FACT Ene</p-tab>
      <p-tab [value]="1">FACT Acu</p-tab>
      <p-tab [value]="2">Costos</p-tab>
      <p-tab [value]="3">Tarifas</p-tab>
    </p-tablist>
    <p-tabpanels>
      <!-- Energía -->
      <p-tabpanel [value]="0">
        <div *ngIf="energiaLoading()" class="text-center py-4">
          <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
          <p>Cargando...</p>
        </div>
        <div *ngIf="energiaError()" class="p-error p-3">
          <i class="pi pi-exclamation-circle"></i> {{ energiaError() }}
        </div>
        <div *ngIf="!energiaLoading() && !energiaError() && energiaData().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i>
          <p>Sin datos para mostrar</p>
        </div>
        <app-tabla-avanzada
          *ngIf="energiaData().length > 0"
          [columnas]="columnasEnergia"
          [rows]="energiaData()"
          storageKey="infogenerales-energia"
          nombreExportar="FactEnergia"
        ></app-tabla-avanzada>
      </p-tabpanel>

      <!-- Acueducto -->
      <p-tabpanel [value]="1">
        <div *ngIf="acueductoLoading()" class="text-center py-4">
          <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
          <p>Cargando...</p>
        </div>
        <div *ngIf="acueductoError()" class="p-error p-3">
          <i class="pi pi-exclamation-circle"></i> {{ acueductoError() }}
        </div>
        <div *ngIf="!acueductoLoading() && !acueductoError() && acueductoData().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i>
          <p>Sin datos para mostrar</p>
        </div>
        <app-tabla-avanzada
          *ngIf="acueductoData().length > 0"
          [columnas]="columnasAcueducto"
          [rows]="acueductoData()"
          storageKey="infogenerales-acueducto"
          nombreExportar="FactAcueducto"
        ></app-tabla-avanzada>
      </p-tabpanel>

      <!-- Costos -->
      <p-tabpanel [value]="2">
        <div *ngIf="costosLoading()" class="text-center py-4">
          <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
          <p>Cargando...</p>
        </div>
        <div *ngIf="costosError()" class="p-error p-3">
          <i class="pi pi-exclamation-circle"></i> {{ costosError() }}
        </div>
        <div *ngIf="!costosLoading() && !costosError() && costosData().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i>
          <p>Sin datos para mostrar</p>
        </div>
        <app-tabla-avanzada
          *ngIf="costosData().length > 0"
          [columnas]="columnasCostos"
          [rows]="costosData()"
          storageKey="infogenerales-costos"
          nombreExportar="Costos"
        ></app-tabla-avanzada>
      </p-tabpanel>

      <!-- Tarifas -->
      <p-tabpanel [value]="3">
        <div *ngIf="tarifasLoading()" class="text-center py-4">
          <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
          <p>Cargando...</p>
        </div>
        <div *ngIf="tarifasError()" class="p-error p-3">
          <i class="pi pi-exclamation-circle"></i> {{ tarifasError() }}
        </div>
        <div *ngIf="!tarifasLoading() && !tarifasError() && tarifasData().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i>
          <p>Sin datos para mostrar</p>
        </div>
        <app-tabla-avanzada
          *ngIf="tarifasData().length > 0"
          [columnas]="columnasTarifas"
          [rows]="tarifasData()"
          storageKey="infogenerales-tarifas"
          nombreExportar="Tarifas"
        ></app-tabla-avanzada>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>

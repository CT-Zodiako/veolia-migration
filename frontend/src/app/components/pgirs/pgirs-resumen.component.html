<p-toast></p-toast>

<div class="card-section">
  <div class="grid mb-3">
    <div class="col-12 md:col-4">
      <app-aps-selector
        [selectedAps]="aps()"
        (selectedApsChange)="onApsChange($event)"
        label="APS"
      ></app-aps-selector>
    </div>
  </div>
</div>

<div class="card-section">
  <p-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
    <p-tablist>
      <p-tab [value]="0">Clus</p-tab>
      <p-tab [value]="1">Barrido</p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel [value]="0">
        <div *ngIf="loading()" class="text-center py-4">
          <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i><p>Cargando...</p>
        </div>

        <div *ngIf="error()" class="p-error p-3">
          <i class="pi pi-exclamation-circle"></i> {{ error() }}
        </div>

        <div *ngIf="!loading() && !error() && data().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i><p>Sin datos</p>
        </div>

        <app-tabla-avanzada
          *ngIf="data().length > 0"
          [columnas]="columnasClus"
          [rows]="data()"
          storageKey="pgirs-informe-variables-clus"
          nombreExportar="InformeVariablesPGIRS-Clus"
          [cellClass]="cellClassMedido"
        ></app-tabla-avanzada>
      </p-tabpanel>

      <p-tabpanel [value]="1">
        <div *ngIf="loadingBarrido()" class="text-center py-4">
          <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i><p>Cargando...</p>
        </div>

        <div *ngIf="errorBarrido()" class="p-error p-3">
          <i class="pi pi-exclamation-circle"></i> {{ errorBarrido() }}
        </div>

        <div *ngIf="!loadingBarrido() && !errorBarrido() && dataBarrido().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i><p>Sin datos</p>
        </div>

        <app-tabla-avanzada
          *ngIf="dataBarrido().length > 0"
          [columnas]="columnasBarrido"
          [rows]="dataBarrido()"
          storageKey="pgirs-informe-variables-barrido"
          nombreExportar="InformeVariablesPGIRS-Barrido"
          [cellClass]="cellClassMedido"
        ></app-tabla-avanzada>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>

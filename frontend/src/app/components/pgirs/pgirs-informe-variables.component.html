<p-toast></p-toast>

<div class="pgirs-header">
  <h2>Resumen PGIRS</h2>
</div>

<div class="card-section">
  <div class="grid mb-3">
    <div class="col-12 md:col-4">
      <app-aps-selector
        [selectedAps]="aps()"
        (selectedApsChange)="onApsChange($event)"
        label="APS"
      ></app-aps-selector>
    </div>
  </div>
</div>

<div class="card-section">
  <div *ngIf="loading()" class="text-center py-4">
    <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
    <p>Cargando...</p>
  </div>

  <div *ngIf="error()" class="p-error p-3">
    <i class="pi pi-exclamation-circle"></i> {{ error() }}
  </div>

  <div *ngIf="!loading() && !error() && data().length === 0" class="text-center py-4 text-secondary">
    <i class="pi pi-inbox" style="font-size: 2rem"></i>
    <p>Sin datos</p>
  </div>

  <app-tabla-avanzada
    *ngIf="data().length > 0"
    [columnas]="columnasResumen"
    [rows]="data()"
    storageKey="pgirs-resumen"
    nombreExportar="ResumenPGIRS"
    [cellClass]="cellClassResumen"
  ></app-tabla-avanzada>
</div>

<section>
  <h2>Detalle Tarifas General</h2>

  <app-parametros-consulta
    [mostrarAps]="false"
    [(anno)]="anno"
    [(mes)]="mes"
    [loading]="loading"
    [autoConsultar]="true"
    (consultar)="consultar()"
    (parametrosIncompletos)="limpiar()"
  ></app-parametros-consulta>

  <p *ngIf="loading">Cargando...</p>
  <p *ngIf="error" class="error">{{ error }}</p>

  <p *ngIf="!loading && !error && rows.length === 0">Sin datos para el período seleccionado.</p>

  <div *ngIf="!loading && rows.length > 0" class="table-wrapper">
    <p-table [value]="rows" [columns]="getColumns(rows)" [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template pTemplate="header" let-columns>
        <tr>
          <th *ngFor="let col of columns">{{ col }}</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row let-columns="columns">
        <tr>
          <td *ngFor="let col of columns">{{ row[col] }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</section>

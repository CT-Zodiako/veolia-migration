<div class="modal-overlay" (click)="cancel.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ isEditing() ? 'Editar Empresa' : 'Nueva Empresa' }}</h3>
      <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (click)="cancel.emit()"></p-button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre</label>
        <input pInputText type="text" [(ngModel)]="nombre" name="nombre" required style="width: 100%" />
      </div>

      <div class="form-group">
        <label>NUAP</label>
        <input pInputText type="text" [(ngModel)]="nuap" name="nuap" style="width: 100%" />
      </div>

      <div class="checks-grid">
        <div class="check-item">
          <p-checkbox [(ngModel)]="estado" [binary]="true" inputId="empresa-estado" name="estado"></p-checkbox>
          <label for="empresa-estado">Activa</label>
        </div>
        <div class="check-item">
          <p-checkbox [(ngModel)]="propia" [binary]="true" inputId="empresa-propia" name="propia"></p-checkbox>
          <label for="empresa-propia">Propia</label>
        </div>
      </div>

      <p-button type="submit" label="{{ loading ? 'Guardando...' : 'Guardar' }}" [loading]="loading" styleClass="w-full"></p-button>
    </form>
  </div>
</div>

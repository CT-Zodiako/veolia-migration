<div class="empresas-container">
  <div class="empresas-header">
    <h2>Configuración Empresas</h2>
    <p-button icon="pi pi-plus" label="Nueva Empresa" (click)="openCreate()"></p-button>
  </div>

  <div *ngIf="error" class="error-message">{{ error }}</div>

  <div class="table-container" *ngIf="!loading; else loadingTpl">
    <p-table [value]="filteredEmpresas" [tableStyle]="{ 'min-width': '50rem' }" [paginator]="true" [rows]="10">
      <ng-template pTemplate="header">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Estado</th>
          <th>Propia</th>
          <th>NUAP</th>
          <th>Acciones</th>
        </tr>
        <tr class="filter-row">
          <th></th>
          <th>
            <input
              pInputText
              type="text"
              class="column-filter-input"
              placeholder="Buscar"
              (input)="nombreFilter = $any($event.target).value" />
          </th>
          <th></th>
          <th></th>
          <th></th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td>{{ item.EMPR_EMPR }}</td>
          <td>{{ item.EMPR_NOMBRE }}</td>
          <td>
            <p-button
              [label]="item.EMPR_ESTADO === 1 ? 'Activa' : 'Inactiva'"
              [severity]="item.EMPR_ESTADO === 1 ? 'success' : 'secondary'"
              size="small"
              (onClick)="toggleEstado(item)">
            </p-button>
          </td>
          <td>{{ item.EMPR_PROPIA == 1 ? 'Sí' : 'No' }}</td>
          <td>{{ item.EMPR_NUAP || '-' }}</td>
          <td class="actions-cell">
            <p-button icon="pi pi-pencil" severity="info" size="small" (click)="openEdit(item)"></p-button>
            <p-button icon="pi pi-trash" severity="danger" size="small" (click)="eliminar(item)"></p-button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <ng-template #loadingTpl>
    <p>Cargando...</p>
  </ng-template>

  <app-empresa-form
    *ngIf="showForm"
    [empresa]="selectedEmpresa"
    [loading]="loading"
    (save)="save($event)"
    (cancel)="closeForm()">
  </app-empresa-form>
</div>

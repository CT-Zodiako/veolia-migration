<section>
  <div class="card-section">
    <app-aps-selector
      [selectedAps]="aps"
      (selectedApsChange)="onApsChange($event)">
    </app-aps-selector>
  </div>

  <div class="card-section">
    <p *ngIf="loading" class="loading-text">Cargando...</p>
    <p *ngIf="error" class="error-message">{{ error }}</p>

    <p-tabs value="f19">
      <p-tablist>
        <p-tab *ngFor="let f of formatos" [value]="f.key">{{ f.label }}</p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel *ngFor="let f of formatos" [value]="f.key">
          <h3 class="formato-titulo">{{ data[f.key].titulo }}</h3>
          <app-tabla-avanzada
            [columnas]="data[f.key].columnas"
            [rows]="data[f.key].rows"
            [storageKey]="data[f.key].storageKey"
            [nombreExportar]="data[f.key].nombreExportar">
          </app-tabla-avanzada>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>
</section>

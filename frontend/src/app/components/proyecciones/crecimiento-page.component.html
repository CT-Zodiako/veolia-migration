<div class="page-wrap">
  <p-card>
    <div class="toolbar">
      <app-aps-selector [selectedAps]="apsaId()" (selectedApsChange)="onApsChange($event)" label=""></app-aps-selector>
      <p-select [options]="proyecciones()" optionLabel="proyNombre" optionValue="proyId" [(ngModel)]="proyId" placeholder="Proyección"></p-select>
      <p-button label="Consultar" icon="pi pi-search" (onClick)="consultar()"></p-button>
    </div>
  </p-card>

  <p-card styleClass="mt-3">
    <p-tabs value="0">
      <p-tablist>
        <p-tab value="0">Usuarios</p-tab>
        <p-tab value="1">Info Propia</p-tab>
        <p-tab value="2">Info Terceros</p-tab>
        <p-tab value="3">Descuentos</p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel value="0"><p-table [value]="usuarios"></p-table><p-button class="mt-2" label="Guardar" (onClick)="guardarUsuarios()"></p-button></p-tabpanel>
        <p-tabpanel value="1"><p-table [value]="propia"></p-table><p-button class="mt-2" label="Guardar" (onClick)="guardarPropia()"></p-button></p-tabpanel>
        <p-tabpanel value="2"><p-table [value]="terceros"></p-table><p-button class="mt-2" label="Guardar" (onClick)="guardarTerceros()"></p-button></p-tabpanel>
        <p-tabpanel value="3"><p-table [value]="descuentos"></p-table><p-button class="mt-2" label="Guardar" (onClick)="guardarDescuentos()"></p-button></p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </p-card>
</div>

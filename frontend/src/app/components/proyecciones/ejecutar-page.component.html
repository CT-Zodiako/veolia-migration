<p-toast></p-toast>

<div class="card-section">
  <div class="grid">
    <div class="col-12 md:col-3">
      <app-aps-selector [selectedAps]="apsaId()" (selectedApsChange)="onApsChange($event)" label="APS"></app-aps-selector>
    </div>
    <div class="col-12 md:col-3">
      <app-proyeccion-selector
        [aps]="apsaId()"
        [selectedProyeccion]="proyId()"
        (selectedProyeccionChange)="onProyChange($event)"
        (proyeccionChange)="onProyeccionChange($event)"
        label="Proyección"
      ></app-proyeccion-selector>
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Horizonte Desde</label>
      <input pInputText class="w-full" [ngModel]="horizonteDesde()" disabled />
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Horizonte Hasta</label>
      <input pInputText class="w-full" [ngModel]="horizonteHasta()" disabled />
    </div>
    <div class="col-12">
      <label class="block mb-1">Descripción</label>
      <textarea
        pTextarea
        class="w-full"
        rows="3"
        [ngModel]="proyeccionSeleccionada()?.proyDescripcion || ''"
        disabled
      ></textarea>
    </div>
    <div class="col-12 flex justify-content-end">
      <p-button
        label="Ejecutar Proyección"
        icon="pi pi-play"
        severity="success"
        [loading]="ejecutando()"
        [disabled]="!proyId()"
        (onClick)="ejecutar()"
      ></p-button>
    </div>
  </div>
  <div *ngIf="resultado()" class="p-3 mt-2" [ngClass]="resultadoExito() ? 'success-message' : 'error-message'">
    <i [class]="resultadoExito() ? 'pi pi-check-circle' : 'pi pi-exclamation-circle'"></i>
    <strong>Resultado:</strong> {{ resultado() }}
  </div>
</div>

<div class="card-section">
  <p-tabs value="0">
    <p-tablist>
      <p-tab value="0">Líneas de Tiempo</p-tab>
      <p-tab value="1">Variables</p-tab>
    </p-tablist>
    <p-tabpanels>
      <p-tabpanel value="0">
        <div *ngIf="lineaTiempoRows().length === 0" class="text-center py-4 text-secondary">
          <i class="pi pi-inbox" style="font-size: 2rem"></i>
          <p>Sin datos para esta proyección.</p>
        </div>
        <app-tabla-avanzada
          *ngIf="lineaTiempoRows().length > 0"
          [columnas]="columnasLineaTiempo"
          [rows]="$any(lineaTiempoRows())"
          storageKey="proyectar-linea-tiempo"
          nombreExportar="LineaTiempo"
        ></app-tabla-avanzada>
      </p-tabpanel>

      <p-tabpanel value="1">
        <p-tabs value="0">
          <p-tablist>
            <p-tab value="0">Usuarios</p-tab>
            <p-tab value="1">Info Propia</p-tab>
            <p-tab value="2">Info Terceros</p-tab>
            <p-tab value="3">Descuentos Costo</p-tab>
          </p-tablist>
          <p-tabpanels>
            <p-tabpanel value="0">
              <div *ngIf="usuarios().length === 0" class="text-center py-4 text-secondary">
                <i class="pi pi-inbox" style="font-size: 2rem"></i>
                <p>Sin datos para esta proyección.</p>
              </div>
              <app-tabla-avanzada
                *ngIf="usuarios().length > 0"
                [columnas]="columnasUsuarios()"
                [rows]="usuarios()"
                storageKey="proyectar-usuarios"
                nombreExportar="Usuarios"
              ></app-tabla-avanzada>
            </p-tabpanel>
            <p-tabpanel value="1">
              <div *ngIf="propia().length === 0" class="text-center py-4 text-secondary">
                <i class="pi pi-inbox" style="font-size: 2rem"></i>
                <p>Sin datos para esta proyección.</p>
              </div>
              <app-tabla-avanzada
                *ngIf="propia().length > 0"
                [columnas]="columnasPropia()"
                [rows]="propia()"
                storageKey="proyectar-propia"
                nombreExportar="InfoPropia"
              ></app-tabla-avanzada>
            </p-tabpanel>
            <p-tabpanel value="2">
              <div *ngIf="terceros().length === 0" class="text-center py-4 text-secondary">
                <i class="pi pi-inbox" style="font-size: 2rem"></i>
                <p>Sin datos para esta proyección.</p>
              </div>
              <app-tabla-avanzada
                *ngIf="terceros().length > 0"
                [columnas]="columnasTerceros()"
                [rows]="terceros()"
                storageKey="proyectar-terceros"
                nombreExportar="InfoTerceros"
              ></app-tabla-avanzada>
            </p-tabpanel>
            <p-tabpanel value="3">
              <div *ngIf="descuentos().length === 0" class="text-center py-4 text-secondary">
                <i class="pi pi-inbox" style="font-size: 2rem"></i>
                <p>Sin datos para esta proyección.</p>
              </div>
              <app-tabla-avanzada
                *ngIf="descuentos().length > 0"
                [columnas]="columnasDescuentos()"
                [rows]="descuentos()"
                storageKey="proyectar-descuentos"
                nombreExportar="DescuentosCosto"
              ></app-tabla-avanzada>
            </p-tabpanel>
          </p-tabpanels>
        </p-tabs>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>

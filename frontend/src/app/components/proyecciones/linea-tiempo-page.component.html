<p-toast></p-toast>

<div class="card-section">
  <div class="grid">
    <div class="col-12 md:col-3">
      <app-aps-selector
        [selectedAps]="aps()"
        (selectedApsChange)="onApsChange($event)"
        label="APS"
      ></app-aps-selector>
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Proyección</label>
      <p-select
        [options]="proyecciones()"
        optionLabel="proyNombre"
        optionValue="proyId"
        placeholder="Seleccione proyección"
        [ngModel]="proyId()"
        (ngModelChange)="onProyChange($event)"
        [disabled]="proyecciones().length === 0"
        styleClass="w-full"
      ></p-select>
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Horizonte Desde</label>
      <input pInputText class="w-full" [ngModel]="horizonteDesde()" disabled />
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-1">Horizonte Hasta</label>
      <input pInputText class="w-full" [ngModel]="horizonteHasta()" disabled />
    </div>
    <div class="col-12">
      <label class="block mb-1">Descripción</label>
      <textarea
        pTextarea
        class="w-full"
        rows="3"
        [ngModel]="proyeccionSeleccionada()?.proyDescripcion || ''"
        disabled
      ></textarea>
    </div>
  </div>
</div>

<div class="card-section">
  <div *ngIf="loading()" class="text-center py-4">
    <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
    <p>Cargando...</p>
  </div>

  <div *ngIf="!loading() && rows().length === 0" class="text-center py-4 text-secondary">
    <i class="pi pi-inbox" style="font-size: 2rem"></i>
    <p>Seleccione una proyección para ver su línea de tiempo</p>
  </div>

  <app-tabla-avanzada
    *ngIf="!loading() && rows().length > 0"
    [columnas]="columnas"
    [rows]="$any(rows())"
    storageKey="proyecciones-linea-tiempo"
    nombreExportar="LineaTiempo"
    [cellTemplate]="celda"
    [accionesTemplate]="acciones"
  ></app-tabla-avanzada>

  <ng-template #celda let-value let-row="row" let-col="col">
    <ng-container [ngSwitch]="col.field">
      <span *ngSwitchCase="'anno'">{{ value }}</span>
      <span *ngSwitchCase="'mes'">{{ value }}</span>

      <ng-container *ngSwitchDefault>
        <p-inputNumber
          *ngIf="editingKey() === rowKey(row); else valorReadonly"
          [ngModel]="valorEditado(col)"
          (ngModelChange)="actualizarDraft(col.field, $event)"
          mode="decimal"
          [minFractionDigits]="0"
          [maxFractionDigits]="5"
          class="w-full"
        ></p-inputNumber>
        <ng-template #valorReadonly>{{ value ?? 0 }}</ng-template>
      </ng-container>
    </ng-container>
  </ng-template>

  <ng-template #acciones let-row>
    <div class="actions-cell">
      <ng-container *ngIf="editingKey() === rowKey(row); else accionEditar">
        <p-button icon="pi pi-check" severity="success" size="small" (onClick)="confirmarEdicionFila()"></p-button>
        <p-button icon="pi pi-times" severity="secondary" size="small" (onClick)="cancelarEdicionFila()"></p-button>
      </ng-container>
      <ng-template #accionEditar>
        <p-button icon="pi pi-pencil" severity="info" size="small" (onClick)="iniciarEdicionFila(row)"></p-button>
      </ng-template>
    </div>
  </ng-template>

  <div *ngIf="!loading() && rows().length > 0" class="actions mt-3">
    <p-button label="Guardar" icon="pi pi-save" severity="success" [loading]="saving()" (onClick)="guardar()"></p-button>
  </div>
</div>

<p-toast></p-toast>

<p-card>
  <div class="mb-3 flex justify-content-start">
    <p-button label="Nueva Proyección" icon="pi pi-plus" severity="success" (onClick)="nueva()"></p-button>
  </div>

  <p-table
    [value]="filteredRows"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [tableStyle]="{ 'min-width': '100%' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>APS</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Tipo Proy</th>
        <th>Desde</th>
        <th>Hasta</th>
        <th>Usuario</th>
        <th>Acciones</th>
      </tr>
      <tr class="filter-row">
        <th></th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="apsFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="nombreFilter = $any($event.target).value" />
        </th>
        <th></th>
        <th></th>
        <th></th>
        <th></th>
        <th></th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.proyId }}</td>
        <td>{{ row.apsaNombre }}</td>
        <td>{{ row.proyNombre }}</td>
        <td>{{ row.proyDescripcion }}</td>
        <td>{{ row.proyTipoNombre }}</td>
        <td>{{ row.proyAnnoDes }}/{{ row.proyMesDes }}</td>
        <td>{{ row.proyAnnoHas }}/{{ row.proyMesHas }}</td>
        <td>{{ row.sisuCorreo }}</td>
        <td class="actions-cell">
          <p-button icon="pi pi-pencil" severity="info" size="small" (onClick)="editar(row)"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog [visible]="showDialog()" [modal]="true" [closable]="true" [style]="{ width: '42rem' }" header="Proyección" (visibleChange)="showDialog.set($event)">
  <div class="form-grid">
    <app-aps-selector [selectedAps]="form.apsaId || null" (selectedApsChange)="onApsChange($event)" label="APS"></app-aps-selector>
    <label>Nombre</label>
    <input pInputText [(ngModel)]="form.proyNombre" />
    <label>Año desde</label>
    <p-inputNumber [(ngModel)]="form.proyAnnoDes"></p-inputNumber>
    <label>Mes desde</label>
    <p-inputNumber [(ngModel)]="form.proyMesDes" [min]="1" [max]="12"></p-inputNumber>
    <label>Año hasta</label>
    <p-inputNumber [(ngModel)]="form.proyAnnoHas"></p-inputNumber>
    <label>Mes hasta</label>
    <p-inputNumber [(ngModel)]="form.proyMesHas" [min]="1" [max]="12"></p-inputNumber>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" (onClick)="showDialog.set(false)"></p-button>
    <p-button label="Guardar" icon="pi pi-save" [loading]="saving()" (onClick)="guardar()"></p-button>
  </ng-template>
</p-dialog>

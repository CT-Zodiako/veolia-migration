<div class="change-pass-container">
  <h2>Cambiar Contraseña</h2>

  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="success" class="success-message">{{ success }}</div>

  <form (ngSubmit)="changePassword()">
    <div class="form-group">
      <label>Contraseña Actual</label>
      <input
        pInputText
        type="password"
        [(ngModel)]="oldPass"
        name="oldPass"
        placeholder="••••••••"
        required
        style="width: 100%"
      />
    </div>

    <div class="form-group">
      <label>Nueva Contraseña</label>
      <input
        pInputText
        type="password"
        [(ngModel)]="newPass"
        name="newPass"
        placeholder="••••••••"
        required
        style="width: 100%"
      />
    </div>

    <div class="form-group">
      <label>Confirmar Nueva Contraseña</label>
      <input
        pInputText
        type="password"
        [(ngModel)]="confirmPass"
        name="confirmPass"
        placeholder="••••••••"
        required
        style="width: 100%"
      />
    </div>

    <p-button
      type="submit"
      label="{{ loading ? 'Procesando...' : 'Cambiar Contraseña' }}"
      [loading]="loading"
      styleClass="w-full"
    ></p-button>
  </form>
</div>

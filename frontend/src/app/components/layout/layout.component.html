<div class="layout-container">
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <div class="sidebar-header-text">
        <img src="/Veolia_sml.png" alt="Veolia" class="sidebar-logo" />
        <p>{{ nombreSistema }}</p>
      </div>
      <button
        type="button"
        class="sidebar-toggle"
        [title]="sidebarCollapsed ? 'Expandir menú' : 'Contraer menú'"
        (click)="toggleSidebar()"
      >
        {{ sidebarCollapsed ? '»' : '«' }}
      </button>
    </div>

    <nav class="sidebar-nav">
      <div *ngFor="let group of menuGroups" class="menu-group">
        <!-- Padre -->
        <button
          *ngIf="group.children.length > 1"
          class="nav-item menu-parent"
          [class.expanded]="group.expanded"
          (click)="toggleExpand(group)"
        >
          <span class="nav-icon">{{ group.icon }}</span>
          <span class="nav-label">{{ group.label }}</span>
          <span class="nav-arrow">{{ group.expanded ? '−' : '+' }}</span>
        </button>

        <!-- Si solo tiene un hijo, mostrar como link directo -->
        <a
          *ngIf="group.children.length === 1"
          [routerLink]="group.children[0].path"
          class="nav-item"
          [class.active]="isActive(group.children[0].path)"
        >
          <span class="nav-icon">{{ group.children[0].icon }}</span>
          <span class="nav-label">{{ group.children[0].label }}</span>
        </a>

        <!-- Hijos (submenú) -->
        <div *ngIf="group.expanded && group.children.length > 1" class="submenu">
          <a
            *ngFor="let item of group.children"
            [routerLink]="item.path"
            class="submenu-item"
            [class.active]="isActive(item.path)"
          >
            <span class="submenu-icon">{{ item.icon }}</span>
            <span class="submenu-label">{{ item.label }}</span>
          </a>
        </div>
      </div>
    </nav>
  </aside>

  <main class="main-content" [class.collapsed]="sidebarCollapsed">
    <header class="top-bar">
      <div class="top-bar-title">{{ getPageTitle() }}</div>
      <div class="top-bar-actions">
        <button
          type="button"
          class="theme-toggle-button"
          [title]="themeService.oscuro() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
          (click)="themeService.toggle()"
        >
          <i class="pi" [class.pi-sun]="themeService.oscuro()" [class.pi-moon]="!themeService.oscuro()"></i>
        </button>
        <div class="sistema-switch-container" *ngIf="sistemasDisponibles.length > 1">
          <button
            pButton
            type="button"
            class="sistema-switch-button"
            [loading]="cambiandoSistema"
            (click)="showSistemaDropdown = !showSistemaDropdown"
          >
            <i class="pi pi-sitemap"></i>
            <span>{{ nombreSistema }}</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div *ngIf="showSistemaDropdown" class="sistema-dropdown">
            <button
              *ngFor="let sistema of sistemasDisponibles"
              type="button"
              class="sistema-dropdown-item"
              [class.active]="sistema.SIST_ID === sistemaSeleccionadoId"
              (click)="cambiarSistema(sistema.SIST_ID); showSistemaDropdown = false"
            >
              {{ sistema.SIST_NOMBRE }}
            </button>
          </div>
        </div>
        <app-profile></app-profile>
      </div>
    </header>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

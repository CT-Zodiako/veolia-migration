<div class="profile-container">
  <button pButton class="profile-button" (click)="toggleDropdown()">
    <div class="profile-avatar">
      <img src="/VeoliaLogo.png" alt="Veolia" />
    </div>
    <span class="profile-name">{{ user()?.SISU_NOMBRE || 'Usuario' }}</span>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M2.5 4.5L6 8L9.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div *ngIf="showDropdown" class="profile-dropdown">
    <div class="dropdown-header">
      <div class="name">{{ user()?.SISU_NOMBRE }} {{ user()?.SISU_APELLIDO }}</div>
      <div class="email">{{ user()?.SISU_CORREO }}</div>
    </div>
    <p-button
      icon="pi pi-key"
      label="Cambiar Contraseña"
      [text]="true"
      severity="secondary"
      (click)="goToChangePass()"
      styleClass="w-full justify-content-start"
    ></p-button>
    <div class="dropdown-divider"></div>
    <p-button
      icon="pi pi-sign-out"
      label="Cerrar Sesión"
      [text]="true"
      severity="danger"
      (click)="logout()"
      styleClass="w-full justify-content-start"
    ></p-button>
  </div>
</div>

<p-card header="Autorización Reversiones">
  <div class="p-fluid">
    <app-parametros-consulta
      [wrapInCard]="false"
      [mostrarBoton]="false"
      [(aps)]="aps"
      [(anno)]="anno"
      [(mes)]="mes"
    ></app-parametros-consulta>

    <div class="field" style="margin-bottom: 12px;">
      <label for="descripcion">Descripción</label>
      <textarea
        id="descripcion"
        pInputTextarea
        [(ngModel)]="descripcion"
        rows="4"
        [autoResize]="true"
        style="width: 100%;">
      </textarea>
    </div>

    <p-button
      label="Autorizar"
      [loading]="loading"
      [disabled]="loading"
      (onClick)="autorizar()">
    </p-button>

    <p *ngIf="success" style="color: var(--color-text-success); margin-top: 12px;">{{ success }}</p>
    <p *ngIf="error" style="color: var(--color-brand-accent); margin-top: 12px;">{{ error }}</p>
  </div>
</p-card>

<div class="reversion-container">
  <div *ngIf="error" class="error-message">{{ error }}</div>
  <div *ngIf="success" class="success-message">{{ success }}</div>

  <div class="card-section">
    <app-parametros-consulta
      [wrapInCard]="false"
      [mostrarBoton]="false"
      [(aps)]="aps"
      [(anno)]="anno"
      [(mes)]="mes"
    ></app-parametros-consulta>
  </div>

  <div class="card-section">
    <div class="form-group">
      <label>Descripción</label>
      <textarea pTextarea [(ngModel)]="descripcion" name="descripcion" rows="4" required style="width: 100%"></textarea>
    </div>

    <p-button
      icon="pi pi-check"
      label="{{ loading ? 'Procesando...' : 'Autorizar' }}"
      [loading]="loading"
      (click)="autorizar()"
      styleClass="w-full"
    ></p-button>
  </div>
</div>

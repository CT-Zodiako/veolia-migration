<p-card header="Autorización Reversiones">
  <div class="p-fluid">
    <app-aps-selector [(selectedAps)]="aps"></app-aps-selector>
    <app-anno-selector [(selectedAnno)]="anno"></app-anno-selector>
    <app-mes-selector [(selectedMes)]="mes"></app-mes-selector>

    <div class="field" style="margin-bottom: 12px;">
      <label for="descripcion">Descripción</label>
      <textarea
        id="descripcion"
        pInputTextarea
        [(ngModel)]="descripcion"
        rows="4"
        [autoResize]="true"
        style="width: 100%;">
      </textarea>
    </div>

    <p-button
      label="Autorizar"
      [loading]="loading"
      [disabled]="loading"
      (onClick)="autorizar()">
    </p-button>

    <p *ngIf="success" style="color: #16a34a; margin-top: 12px;">{{ success }}</p>
    <p *ngIf="error" style="color: #dc2626; margin-top: 12px;">{{ error }}</p>
  </div>
</p-card>

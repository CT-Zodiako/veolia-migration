<p-card header="Detallado Autorización Reversiones">
  <p-table [value]="rows" [loading]="loading" [tableStyle]="{ 'min-width': '100%' }">
    <ng-template pTemplate="header">
      <tr>
        <th>APS</th>
        <th>Año</th>
        <th>Mes</th>
        <th>Descripción</th>
        <th>Fecha creación</th>
        <th>Usuario</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row['APSA_NOMAPS'] }}</td>
        <td>{{ row['AUTO_ANNO'] }}</td>
        <td>{{ row['AUTO_MES'] }}</td>
        <td>{{ row['AUTO_DESCRIPCION'] }}</td>
        <td>{{ row['AUTO_FECCREA'] }}</td>
        <td>{{ row['SISU_CORREO'] }}</td>
      </tr>
    </ng-template>
  </p-table>

  <p *ngIf="error" style="color: #dc2626; margin-top: 12px;">{{ error }}</p>
</p-card>

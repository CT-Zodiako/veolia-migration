<p-card>
  <p-table
    [value]="filteredRows"
    [loading]="loading"
    [paginator]="true"
    [rows]="10"
    [tableStyle]="{ 'min-width': '100%' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>APS</th>
        <th>Año</th>
        <th>Mes</th>
        <th>Descripción</th>
        <th>Fecha creación</th>
        <th>Usuario</th>
      </tr>
      <tr class="filter-row">
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="apsFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="annoFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="mesFilter = $any($event.target).value" />
        </th>
        <th></th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="fechaFilter = $any($event.target).value" />
        </th>
        <th>
          <input pInputText type="text" class="column-filter-input" placeholder="Buscar"
            (input)="usuarioFilter = $any($event.target).value" />
        </th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row['APSA_NOMAPS'] }}</td>
        <td>{{ row['AUTO_ANNO'] }}</td>
        <td>{{ row['AUTO_MES'] }}</td>
        <td>{{ row['AUTO_DESCRIPCION'] }}</td>
        <td>{{ row['AUTO_FECCREA'] | date: 'dd/MM/yyyy' }}</td>
        <td>{{ row['SISU_CORREO'] }}</td>
      </tr>
    </ng-template>
  </p-table>

  <p *ngIf="error" style="color: var(--color-brand-accent); margin-top: 12px;">{{ error }}</p>
</p-card>

<div class="modal-overlay" (click)="cancel.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ isEditing() ? 'Editar Relleno' : 'Nuevo Relleno' }}</h3>
      <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (click)="cancel.emit()"></p-button>
    </div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre</label>
        <input pInputText type="text" [(ngModel)]="rell_nomrelleno" name="rell_nomrelleno" required style="width: 100%" />
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea pTextarea [(ngModel)]="rell_descripcion" name="rell_descripcion" rows="3" required style="width: 100%"></textarea>
      </div>

      <div class="form-group">
        <label>NUSD</label>
        <input pInputText type="text" [(ngModel)]="rell_nusd" name="rell_nusd" style="width: 100%" />
      </div>

      <div class="checks-grid">
        <div class="check-item">
          <p-checkbox [(ngModel)]="rell_estado" [binary]="true" inputId="relleno-estado" name="rell_estado"></p-checkbox>
          <label for="relleno-estado">Activo</label>
        </div>
        <div class="check-item">
          <p-checkbox [(ngModel)]="rell_propio" [binary]="true" inputId="relleno-propio" name="rell_propio"></p-checkbox>
          <label for="relleno-propio">Propio</label>
        </div>
        <div class="check-item">
          <p-checkbox [(ngModel)]="rell_regional" [binary]="true" inputId="relleno-regional" name="rell_regional"></p-checkbox>
          <label for="relleno-regional">Regional</label>
        </div>
      </div>

      <p-button type="submit" label="{{ loading ? 'Guardando...' : 'Guardar' }}" [loading]="loading" styleClass="w-full"></p-button>
    </form>
  </div>
</div>
